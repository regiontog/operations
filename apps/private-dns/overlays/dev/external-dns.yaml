apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns-crd-source
rules:
  - apiGroups:
      - externaldns.k8s.io
    resources:
      - dnsendpoints
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - externaldns.k8s.io
    resources:
      - dnsendpoints/status
    verbs:
      - patch
      - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-crd-source
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns-crd-source
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: powerdns

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: external-dns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.21.0
          args:
            - --source=crd
            - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
            - --crd-source-kind=DNSEndpoint
            - --provider=pdns
            - --pdns-server=http://pdns-auth.powerdns.svc.cluster.local:8081
            - --pdns-server-id=localhost
            - --pdns-api-key=$(PDNS_API_KEY)
            - --domain-filter=dev.internal
            - --managed-record-types=A
            - --managed-record-types=CNAME
            - --managed-record-types=TXT
            - --registry=txt
            - --txt-owner-id=operations-dev
            - --policy=sync
            - --interval=30s
          env:
            - name: PDNS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: powerdns-api
                  key: api-key
