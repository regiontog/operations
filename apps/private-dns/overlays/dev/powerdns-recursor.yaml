apiVersion: v1
kind: ConfigMap
metadata:
  name: pdns-recursor-lua
data:
  recursor.lua: |
    addNTA('dev.internal', 'Internal unsigned zone served by pdns-auth')

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdns-recursor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pdns-recursor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pdns-recursor
    spec:
      containers:
        - name: pdns-recursor
          image: powerdns/pdns-recursor-52:5.2.9
          command:
            - pdns_recursor
          args:
            - --daemon=no
            - --local-address=0.0.0.0
            - --local-port=5300
            - --allow-from=0.0.0.0/0,::/0
            - --forward-zones=dev.internal=10.96.53.54:53
            - --forward-zones-recurse=.=1.1.1.1;8.8.8.8
            - --lua-config-file=/etc/powerdns/recursor.lua
            - --loglevel=4
          ports:
            - name: dns-udp
              containerPort: 5300
              protocol: UDP
            - name: dns-tcp
              containerPort: 5300
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: dns-tcp
          livenessProbe:
            tcpSocket:
              port: dns-tcp
          volumeMounts:
            - name: lua-config
              mountPath: /etc/powerdns/recursor.lua
              subPath: recursor.lua
              readOnly: true
      volumes:
        - name: lua-config
          configMap:
            name: pdns-recursor-lua

---
apiVersion: v1
kind: Service
metadata:
  name: pdns-recursor
spec:
  type: ClusterIP
  clusterIP: 10.96.53.53
  selector:
    app.kubernetes.io/name: pdns-recursor
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
