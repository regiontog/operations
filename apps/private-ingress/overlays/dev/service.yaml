apiVersion: v1
kind: Service
metadata:
  name: istio-ingress-private
  namespace: istio-ingress
  labels:
    app.kubernetes.io/name: istio-ingress-private
spec:
  type: ClusterIP
  clusterIP: 10.96.80.80
  selector:
    app: istio-gateway
    istio: gateway
  ports:
    - name: status-port
      port: 15021
      protocol: TCP
      targetPort: 15021
    - name: http2
      port: 8080
      protocol: TCP
      targetPort: 80
    - name: https
      port: 8443
      protocol: TCP
      targetPort: 443

