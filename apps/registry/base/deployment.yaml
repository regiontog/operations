apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: cluster-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: registry
          image: registry:2
          ports:
            - name: registry
              containerPort: 5000
