apiVersion: apps/v1
kind: Deployment
metadata:
  name: operations-bootstrap-registry
  namespace: bootstrap-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: operations-bootstrap-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: operations-bootstrap-registry
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: registry
          image: registry:2
          ports:
            - name: registry
              containerPort: 5000
