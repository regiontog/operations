version: "3"

tasks:
  create-cluster:
    desc: create local development cluster
    vars:
      INGRESS_API_PORT: 6443
      CONTEXT: admin@k0s-dev
      CLUSTER: k0s-dev
      USER: admin@k0s-dev
      SERVER: https://localhost:{{ .INGRESS_API_PORT }}
    cmds:
      - mkdir -p "$HOME/.kube"
      - '[ -e /run/netns ] || sudo mkdir -p /run/netns'
      - '[ -s "$HOME/.kube/config" ] || printf "apiVersion: v1\nkind: Config\npreferences: {}\nclusters: []\nusers: []\ncontexts: []\n" > "$HOME/.kube/config"'
      - docker rm -f -v k0s-controller >/dev/null 2>&1 || true
      - docker run -d --name k0s-controller --hostname k0s-controller --dns 1.1.1.1 --dns 8.8.8.8 --privileged -v /var/lib/k0s -v /var/log/pods --mount type=bind,source=/run/netns,target=/run/netns,bind-propagation=rshared -p {{ .INGRESS_API_PORT }}:6443 ghcr.io/k0sproject/k0s:v1.35.3-k0s.0 k0s controller --enable-worker --no-taints
      - until docker exec k0s-controller k0s kubeconfig admin > "$HOME/.kube/k0s.raw.config" 2>/dev/null; do sleep 1; done
      - kubectl --kubeconfig "$HOME/.kube/k0s.raw.config" config view --raw -o json | jq --arg CONTEXT '{{ .CONTEXT }}' --arg cluster '{{ .CLUSTER }}' --arg user '{{ .USER }}' --arg server '{{ .SERVER }}' '{apiVersion:"v1",kind:"Config",preferences:{},"current-context":$CONTEXT,clusters:[{name:$cluster,cluster:{server:$server,"certificate-authority-data":.clusters[0].cluster["certificate-authority-data"]}}],users:[{name:$user,user:{"client-certificate-data":.users[0].user["client-certificate-data"],"client-key-data":.users[0].user["client-key-data"]}}],contexts:[{name:$CONTEXT,context:{cluster:$cluster,user:$user}}]}' > "$HOME/.kube/k0s.config"
      - kubectl --kubeconfig "$HOME/.kube/config" config delete-context '{{ .CONTEXT }}' >/dev/null 2>&1 || true
      - kubectl --kubeconfig "$HOME/.kube/config" config delete-cluster '{{ .CLUSTER }}' >/dev/null 2>&1 || true
      - kubectl --kubeconfig "$HOME/.kube/config" config delete-user '{{ .USER }}' >/dev/null 2>&1 || true
      - KUBECONFIG="$HOME/.kube/k0s.config:$HOME/.kube/config" kubectl config view --raw --flatten > "$HOME/.kube/config.tmp"
      - mv "$HOME/.kube/config.tmp" "$HOME/.kube/config"
      - chmod 600 "$HOME/.kube/config" "$HOME/.kube/k0s.config"
      - kubectl --kubeconfig "$HOME/.kube/config" config use-context '{{ .CONTEXT }}'
      - until kubectl --kubeconfig "$HOME/.kube/config" --context '{{ .CONTEXT }}' get --raw=/readyz >/dev/null 2>&1; do sleep 2; done
      - kubectl --kubeconfig "$HOME/.kube/config" --context '{{ .CONTEXT }}' get nodes
      - task: setup-localstorage
        vars:
          CONTEXT: "{{ .CONTEXT }}"

  setup-localstorage:
    desc: Installs ranchers localstorage provisioner in the development cluster
    vars:
      CONTEXT:
        ref: .CONTEXT
    cmds:
      - kubectl --context {{ .CONTEXT }} --server-side=true apply --kustomize apps/local-path-provisioner/base --force-conflicts

  bootstrap:
    desc: Builds the bootstrap image and runs the in-cluster bootstrap Job. Run
      like `task bootstrap -- dev`
    vars:
      CONTEXT:
        sh: kubectl config current-context
      CLUSTER: '{{ default "dev" .CLI_ARGS }}'
    prompt: Bootstrapping is potentially destructive to the kubernetes cluster,
      ensure current context is correct. Building and running the bootstrap Job
      with cluster config `clusters/{{ .CLUSTER }}.cluster.yaml` on kubectl
      context `{{ .CONTEXT }}`. Run with --dry to see kubectl commands. Are you
      sure?`
    cmds:
      - BOOTSTRAP_CONTEXT='{{ .CONTEXT }}' apps/cluster-bootstrap/bin/run.sh '{{ .CLUSTER }}'

  refresh:
    desc: Sends webhook to local argocd (https://argocd.localho.st:8443) telling it
      to refresh the apps that changed in the last commit. Watches for new
      commits
    vars:
      GIT_PORT: 5555
      GIT_IP:
        sh: ip -json route get 1 | jq -r '.[0].prefsrc'
      INGRESS_HTTPS_PORT: 8443
      REPO: "http://{{ .GIT_IP }}:{{ .GIT_PORT }}/.git"
      ARGOCD_SERVER: "https://argocd.localho.st:{{ .INGRESS_HTTPS_PORT }}"
    cmds:
      - watchexec -i .git/refs/heads/* -- argocd-webhook-trigger {{ .REPO }} {{
        .ARGOCD_SERVER }} -k
