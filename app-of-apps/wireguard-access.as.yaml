apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: wireguard-access
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusterDecisionResource:
        configMapRef: cluster-appdecision
        labelSelector:
          matchLabels:
            type.app-decisions.example.com: "cluster"
        # Checks for changes every 60sec (default 3min)
        requeueAfterSeconds: 60
  template:
    metadata:
      name: wireguard-access-{{ .env }}
    spec:
      project: default
      source:
        path: apps/wireguard-access/overlays/{{ .env }}
        repoURL: "{{ .repoURL }}"
        targetRevision: "{{ .targetRevision }}"
      destination:
        namespace: wireguard
        server: "{{ .server }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
        syncOptions:
          - CreateNamespace=true
